volumes:
  mariadb_{{environment}}_data:
    external: false

services:
  mysql:
    image: mariadb:{{mariadb_version}}
    restart: always
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: 1
      MARIADB_DATABASE: '{{mysql_database}}'
      MARIADB_USER: '{{mysql_user}}'
      MARIADB_PASSWORD: '{{mysql_random_password}}'
    volumes:
      - mariadb_{{environment}}_data:/var/lib/mysql
      # /etc/mysql/my.cnf - here we find `!includedir /etc/mysql/conf.d/`
      - './mysql/my.cnf:/etc/mysql/conf.d/zzz-my.cnf:ro'
      - ./mysql_initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # MariaDB 11.x dropped `mysqladmin` (renamed to `mariadb-admin`).
      # `healthcheck.sh` ships in all official MariaDB Docker images and works across versions.
      test: "healthcheck.sh --connect --innodb_initialized"
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10
